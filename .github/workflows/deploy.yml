name: Deploy to Aliyun FC

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  GO_VERSION: "1.25"
  ALIYUN_REGION: "ap-southeast-1"

jobs:
  # ========== 构建 ==========
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build for Aliyun FC
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o ai-novel-backend ./cmd/server
          echo "✅ Build successful"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fc-build
          path: ai-novel-backend
          retention-days: 1

  # ========== 部署到阿里云函数计算 ==========
  deploy:
    name: Deploy to Aliyun FC
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: ${{ steps.deploy.outputs.domain }}
    outputs:
      domain: ${{ steps.deploy.outputs.domain }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: fc-build

      - name: Make binary executable
        run: chmod +x ai-novel-backend

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Serverless Devs
        run: npm install -g @serverless-devs/s

      - name: Configure Aliyun credentials
        run: |
          s config add --AccountID ${{ secrets.ALIYUN_ACCOUNT_ID }} --AccessKeyID ${{ secrets.ALIYUN_ACCESS_KEY_ID }} --AccessKeySecret ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }} --alias default

      - name: Prepare environment variables
        run: |
          cat > .env << EOF
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX_NAME=${{ secrets.PINECONE_INDEX_NAME }}
          PINECONE_NAMESPACE=${{ secrets.PINECONE_NAMESPACE }}
          LLM_PROVIDER=${{ vars.LLM_PROVIDER || 'deepseek' }}
          LLM_BASE_URL=${{ vars.LLM_BASE_URL || 'https://api.deepseek.com' }}
          LLM_MODEL=${{ vars.LLM_MODEL || 'deepseek-chat' }}
          DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          EOF

      - name: Deploy to Aliyun FC
        id: deploy
        run: |
          s deploy -y
          echo "domain=$(s domain | grep -oP 'https://\K[^ ]+' | head -1)" >> $GITHUB_OUTPUT

      - name: Health check
        run: |
          DOMAIN=$(s domain | grep -oP 'https://\K[^ ]+' | head -1)
          echo "Waiting for deployment to be ready..."
          sleep 30
          curl -f $DOMAIN/health || exit 1
          echo "✅ Health check passed"

      - name: Notify deployment success
        if: success()
        run: |
          echo "🎉 部署成功！"
          echo "访问地址：$(s domain | grep -oP 'https://\K[^ ]+' | head -1)"

  # ========== 清理旧版本（可选）==========
  cleanup:
    name: Cleanup Old Versions
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Serverless Devs
        run: npm install -g @serverless-devs/s

      - name: Configure Aliyun credentials
        run: |
          s config add --AccountID ${{ secrets.ALIYUN_ACCOUNT_ID }} --AccessKeyID ${{ secrets.ALIYUN_ACCESS_KEY_ID }} --AccessKeySecret ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }} --alias default

      - name: List old versions
        run: s list version --limit 10

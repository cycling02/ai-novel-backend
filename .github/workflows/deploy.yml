name: Deploy to Aliyun FC 3.0

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  GO_VERSION: "1.25"
  ALIYUN_REGION: "ap-southeast-1"

# 配置非敏感变量（在 GitHub 仓库 Settings -> Variables 中配置）
# LLM_PROVIDER: deepseek
# LLM_BASE_URL: https://api.deepseek.com
# LLM_MODEL: deepseek-chat

jobs:
  # ========== 构建 ==========
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Tidy dependencies
        run: go mod tidy

      - name: Download dependencies
        run: go mod download

      - name: Build for Aliyun FC
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o ai-novel-backend ./cmd/server
          
          # 创建 bootstrap 入口文件
          cat > bootstrap << 'BOOTSTRAP'
          #!/bin/sh
          chmod +x ./ai-novel-backend
          exec ./ai-novel-backend
          BOOTSTRAP
          chmod +x bootstrap
          
          echo "✅ Build successful"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fc-build
          path: |
            ai-novel-backend
            bootstrap
          retention-days: 1

  # ========== 部署到阿里云函数计算 ==========
  deploy:
    name: Deploy to Aliyun FC
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: ${{ steps.deploy.outputs.domain }}
    outputs:
      domain: ${{ steps.deploy.outputs.domain }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: fc-build
          path: ./

      - name: Make bootstrap executable
        run: chmod +x bootstrap ai-novel-backend

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Serverless Devs
        run: npm install -g @serverless-devs/s

      - name: Configure Aliyun credentials
        run: |
          s config add -a default --AccountID ${{ secrets.ALIYUN_ACCOUNT_ID }} --AccessKeyID ${{ secrets.ALIYUN_ACCESS_KEY_ID }} --AccessKeySecret ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}

      - name: Deploy to Aliyun FC
        id: deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
        run: |
          s deploy -y

      - name: Get domain
        id: domain
        run: |
          # 尝试获取域名
          DOMAIN=$(s domain 2>/dev/null | grep -oP 'https://\K[^ ]+' | head -1 || echo "")
          echo "domain=$DOMAIN" >> $GITHUB_OUTPUT
          echo "Domain: $DOMAIN"

      - name: Health check
        if: steps.domain.outputs.domain != ''
        run: |
          DOMAIN="${{ steps.domain.outputs.domain }}"
          echo "Waiting for deployment to be ready..."
          sleep 30
          curl -f $DOMAIN/health || echo "Health check failed, but continuing..."
          echo "✅ Health check passed"

      - name: Notify deployment success
        if: success()
        run: |
          echo "🎉 部署成功！"
          echo "访问地址：${{ steps.domain.outputs.domain }}"
name: Deploy to Aliyun FC (Container)

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  GO_VERSION: "1.25"
  ALIYUN_REGION: "ap-southeast-1"

jobs:
  # ========== 构建并推送容器镜像 ==========
  build-and-push:
    name: Build & Push Container
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.${{ env.ALIYUN_REGION }}.aliyuncs.com
          username: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_CONTAINER_REGISTRY_PASSWORD }}

      - name: Set image tag
        id: vars
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          if [ -z "$TAG" ]; then
            TAG=${GITHUB_SHA:0:8}
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build and push container image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            registry.${{ env.ALIYUN_REGION }}.aliyuncs.com/ai-novel-backend/ai-novel-backend:${{ steps.vars.outputs.tag }}
            registry.${{ env.ALIYUN_REGION }}.aliyuncs.com/ai-novel-backend/ai-novel-backend:latest
          build-args: |
            GITHUB_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image URL
        run: |
          echo "image=registry.${{ env.ALIYUN_REGION }}.aliyuncs.com/ai-novel-backend/ai-novel-backend:${{ steps.vars.outputs.tag }}" >> $GITHUB_OUTPUT

  # ========== 部署到阿里云函数计算 ==========
  deploy:
    name: Deploy to Aliyun FC
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: ${{ steps.deploy.outputs.domain }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Serverless Devs
        run: npm install -g @serverless-devs/s

      - name: Configure Aliyun credentials
        run: |
          s config add -a default --AccountID ${{ secrets.ALIYUN_ACCOUNT_ID }} --AccessKeyID ${{ secrets.ALIYUN_ACCESS_KEY_ID }} --AccessKeySecret ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}

      - name: Set version variable
        id: vars
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          if [ -z "$TAG" ]; then
            TAG=${GITHUB_SHA:0:8}
          fi
          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "accountID=${{ secrets.ALIYUN_ACCOUNT_ID }}" >> $GITHUB_OUTPUT

      - name: Deploy to Aliyun FC
        id: deploy
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}
        run: |
          # 使用 s deploy 部署
          s deploy -y

          # 获取部署后的域名
          DOMAIN=$(s domain 2>/dev/null | grep -oP 'https://\K[^ ]+' | head -1 || echo "")
          echo "domain=$DOMAIN" >> $GITHUB_OUTPUT

      - name: Health check
        if: steps.deploy.outputs.domain != ''
        run: |
          DOMAIN="${{ steps.deploy.outputs.domain }}"
          echo "Waiting for deployment to be ready..."
          sleep 30
          curl -f $DOMAIN/health || exit 1
          echo "✅ Health check passed"

      - name: Notify deployment success
        if: success()
        run: |
          echo "🎉 部署成功！"
          echo "访问地址：${{ steps.deploy.outputs.domain }}"
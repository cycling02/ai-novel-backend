server:
  port: 8080
  mode: debug  # debug, release, test

database:
  url: "postgres://user:password@host:5432/dbname?sslmode=require"

vector:
  provider: "pinecone"
  api_key: "your-pinecone-api-key"
  index_name: "ai-novel-index"
  namespace: "novel-embeddings"

llm:
  provider: "deepseek"  # deepseek, openai, minimax, zhipu, moonshot
  api_key: "your-api-key"
  base_url: "https://api.deepseek.com"
  model: "deepseek-chat"

auth:
  jwt_secret: "your-jwt-secret-key"
  token_expiry: "15m"
  refresh_expiry: "7d"


edition: 3.0.0
name: ai-novel-backend
access: default

vars:
  region: ap-southeast-1
  serviceName: ai-novel-service
  functionName: ai-novel-backend

resources:
  ai_novel_service:
    component: fc3
    props:
      region: ${vars.region}
      serviceName: ${vars.serviceName}
      description: "AI 小说创作后端服务"

      # 函数配置
      functionName: ${vars.functionName}
      # 使用内置 Go 运行时（免费）
      runtime: go1

      # 代码目录
      code: ./

      # 入口函数 - 使用预编译的 bootstrap 文件
      handler: bootstrap

      # 函数规格
      cpu: 0.5
      memorySize: 512
      diskSize: 512
      timeout: 120

      # 实例配置
      instanceConcurrency: 100

      # 环境变量
      environmentVariables:
        SERVER_MODE: "release"
        SERVER_PORT: "8080"
        DATABASE_URL: ${env(DATABASE_URL), default=""}
        PINECONE_API_KEY: ${env(PINECONE_API_KEY), default=""}
        PINECONE_INDEX_NAME: ${env(PINECONE_INDEX_NAME), default=""}
        PINECONE_NAMESPACE: ${env(PINECONE_NAMESPACE), default=""}
        LLM_PROVIDER: ${env(LLM_PROVIDER), default="deepseek"}
        LLM_BASE_URL: ${env(LLM_BASE_URL), default="https://api.deepseek.com"}
        LLM_MODEL: ${env(LLM_MODEL), default="deepseek-chat"}
        DEEPSEEK_API_KEY: ${env(DEEPSEEK_API_KEY), default=""}
        OPENAI_API_KEY: ${env(OPENAI_API_KEY), default=""}
        JWT_SECRET: ${env(JWT_SECRET), default=""}

      # 触发器配置 - HTTP 触发器
      triggers:
        - triggerName: http-trigger
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS

      # 忽略文件（不打包上传）
      ignore:
        - .git/**
        - .vscode/**
        - .idea/**
        - "**/*_test.go"
        - /test/**
        - /tests/**
        - README.md
        - "*.md"
        - /docs/**
        - .github/**
        - .env*
        - config.local.yaml
        - Dockerfile
        - deploy.ps1
        - .fcignore
        - "*.yml"
        - "*.yaml"
        - go.sum
        - "*.md"
        - .golangci*
        - .openclaw
        - skills
        - rpapp
        - memory
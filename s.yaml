edition: 3.0.0
name: ai-novel-backend
access: "default"

vars:
  region: ap-southeast-1
  service:
    name: ai-novel-service
    description: AI 网络小说创作后端服务
    internetAccess: true

resources:
  ai-novel-function:
    component: fc
    props:
      region: ${vars.region}
      service: ${vars.service}
      function:
        name: ai-novel-backend
        description: AI 小说创作 API
        runtime: custom
        codeUri: ./
        handler: main
        memorySize: 1024
        timeout: 120
        diskSize: 512
        layers:
          - acs:fc:${vars.region}:official:layers/Go1.25/versions/1
        environmentVariables:
          SERVER_MODE: "release"
          SERVER_PORT: "8080"
          DATABASE_URL: ${env(DATABASE_URL)}
          PINECONE_API_KEY: ${env(PINECONE_API_KEY)}
          PINECONE_INDEX_NAME: ${env(PINECONE_INDEX_NAME)}
          PINECONE_NAMESPACE: ${env(PINECONE_NAMESPACE)}
          LLM_PROVIDER: ${env(LLM_PROVIDER)}
          LLM_BASE_URL: ${env(LLM_BASE_URL)}
          LLM_MODEL: ${env(LLM_MODEL)}
          DEEPSEEK_API_KEY: ${env(DEEPSEEK_API_KEY)}
          OPENAI_API_KEY: ${env(OPENAI_API_KEY)}
          JWT_SECRET: ${env(JWT_SECRET)}
        customRuntimeConfig:
          command:
            - ./ai-novel-backend
          port: 8080

      triggers:
        - name: httpTrigger
          type: http
          config:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS

      customDomains:
        - domainName: auto
          protocol: HTTP
          routeConfigs:
            - path: /*
              methods:
                - GET
                - POST
                - PUT
                - DELETE
                - OPTIONS

edition: 3.0.0
name: ai-novel-backend
access: "default"

vars:
  region: ap-southeast-1
  service:
    name: ai-novel-service
    description: AI 网络小说创作后端服务
    internetAccess: true
  image: registry.ap-southeast-1.aliyuncs.com/${vars.accountID}/ai-novel-backend:${vars.version}

resources:
  ai-novel-function:
    component: fc
    props:
      region: ${vars.region}
      service: ${vars.service}
      function:
        name: ai-novel-backend
        description: AI 小说创作 API (Custom Container)
        runtime: container
        codeUri: ./
        handler: ai-novel-backend
        memorySize: 1024
        timeout: 120
        diskSize: 512
        port: 8080

      triggers:
        - name: httpTrigger
          type: http
          config:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS

      customDomains:
        - domainName: auto
          protocol: HTTP
          routeConfigs:
            - path: /*
              methods:
                - GET
                - POST
                - PUT
                - DELETE
                - OPTIONS